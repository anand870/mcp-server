server:
  name: gold-advisor
  version: "2.0.0"
  description: "Gold price intelligence and buy-opportunity analysis MCP server"

database:
  path: data/gold.db

default_currency: AED
default_carat: 24K

currencies:
  USD:
    enabled: true
  AED:
    enabled: true
  INR:
    enabled: true

carats:
  - 24K
  - 22K
  - 21K
  - 18K

providers:
  currency_order:
    USD:
      - freegoldapi
      - metalsdev
      - goldapi
      - yahoofinance
    AED:
      - igold
      - dubaicityofgold
      - usd_conversion
    INR:
      - khaleejtimes
      - metalsdev_inr
      - usd_conversion
  historical_order:
    USD:
      - yahoofinance
      - freegoldapi
      - metalsdev
      - goldapi
    AED:
      - usd_conversion
    INR:
      - metalsdev_inr
      - usd_conversion
  retry:
    attempts: 3
    wait_min: 1
    wait_max: 5
    wait_multiplier: 1.5

fx:
  cache_ttl_seconds: 3600

indicators:
  ma_periods:
    - 7
    - 30
    - 90
  rsi_period: 14

scoring:
  rules:
    price_below_ma30: 40
    price_below_ma90: 20
    rsi_below_35: 20
    ma7_above_ma30: 20
  thresholds:
    avoid_max: 30
    wait_max: 60
    buy_max: 80
    strong_buy_max: 100

cache:
  price_ttl_seconds: 300
  indicators_ttl_seconds: 3600

http:
  host: "0.0.0.0"
  port: 8080

logging:
  level: INFO
  format: json
  log_file: data/gold-mcp.log
  log_file_max_bytes: 5000000
  log_file_backup_count: 3
