services:
  postgres:
    image: postgres:16-alpine
    container_name: gold-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: gold_db
      POSTGRES_USER: gold_admin
      POSTGRES_PASSWORD: gold_admin_password
    ports:
      - "5436:5432"
    volumes:
      - gold_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gold_admin -d gold_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  gold-mcp-v2:
    build: .
    container_name: gold-advisor-v2-mcp
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://gold_admin:gold_admin_password@postgres:5432/gold_db
      - PYTHONPATH=/app
    stdin_open: true
    tty: true

  gold-http-v2:
    build: .
    container_name: gold-advisor-v2-http
    restart: unless-stopped
    command: ["python", "-m", "src.main", "--http"]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-8080}:8080"
    environment:
      - DATABASE_URL=postgresql://gold_admin:gold_admin_password@postgres:5432/gold_db
      - PYTHONPATH=/app
    profiles:
      - http

volumes:
  gold_pg_data:
    driver: local
